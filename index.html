<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>MEGA ZALIPEX ENGINE 3000</title>

<style>
html,body{
    margin:0;
    overflow:hidden;
    background:black;
    width:100%;
    height:100%;
    touch-action:none;
    font-family:Arial,sans-serif;
}

canvas{
    display:block;
    width:100%;
    height:100%;
}

#ui{
    position:fixed;
    top:14px;
    left:14px;
    z-index:20;
    color:white;
    user-select:none;
}

#title{
    font-size:18px;
    letter-spacing:3px;
    opacity:.9;
    margin-bottom:8px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}

#mode{
    opacity:.8;
    font-size:13px;
    color: #00ffcc;
}

#panel{
    position:fixed;
    right:14px;
    top:14px;
    z-index:20;
    display:flex;
    flex-direction:column;
    gap:8px;
}

.btn{
    width:52px;
    height:52px;
    border:none;
    border-radius:16px;
    background:rgba(255,255,255,.08);
    color:white;
    font-size:18px;
    backdrop-filter:blur(12px);
    cursor:pointer;
    transition: background 0.2s;
}
.btn:active {
    background:rgba(255,255,255,.2);
}

#fps{
    position:fixed;
    bottom:14px;
    left:14px;
    color:white;
    opacity:.3;
    font-size:12px;
    z-index:20;
}
</style>
</head>
<body>

<div id="ui">
    <div id="title">MEGA ZALIPEX</div>
    <div id="mode">VOID</div>
</div>

<div id="panel">
    <button class="btn" id="next">+</button>
    <button class="btn" id="prev">-</button>
</div>

<div id="fps"></div>

<canvas id="c"></canvas>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.164/build/three.module.js";

const canvas = document.getElementById("c");

const renderer = new THREE.WebGLRenderer({
    canvas,
    antialias:true,
    powerPreference:"high-performance"
});

renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

const uniforms = {
    uTime:{value:0},
    uResolution:{value:new THREE.Vector2(innerWidth,innerHeight)},
    uPointer:{value:new THREE.Vector2(0.5,0.5)},
    uMode:{value:0},
    uClick:{value:0}
};

const vertexShader = `
varying vec2 vUv;
void main(){
    vUv = uv;
    gl_Position = vec4(position,1.0);
}
`;

const fragmentShader = `
precision highp float;

uniform float uTime;
uniform vec2 uResolution;
uniform vec2 uPointer;
uniform float uMode;
uniform float uClick;

varying vec2 vUv;

#define PI 3.14159265359

// Хэш и шум
float hash(vec2 p){
    return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453123);
}

vec2 random2(vec2 p) {
    return fract(sin(vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3))))*43758.5453);
}

float noise(vec2 p){
    vec2 i = floor(p);
    vec2 f = fract(p);
    f = f*f*(3.0-2.0*f);
    float a = hash(i); float b = hash(i+vec2(1.0,0.0));
    float c = hash(i+vec2(0.0,1.0)); float d = hash(i+vec2(1.0,1.0));
    return mix(mix(a,b,f.x), mix(c,d,f.x), f.y);
}

mat2 rot(float a) {
    float s = sin(a), c = cos(a);
    return mat2(c, -s, s, c);
}

float fbm(vec2 p){
    float v = 0.0; float a = 0.5;
    mat2 r = rot(0.5);
    for(int i=0; i<5; i++){
        v += noise(p)*a; p = r * p * 2.0; a *= 0.5;
    }
    return v;
}

float voronoi(vec2 x) {
    vec2 n = floor(x);
    vec2 f = fract(x);
    float res = 8.0;
    for(int j=-1; j<=1; j++) {
        for(int i=-1; i<=1; i++) {
            vec2 b = vec2(float(i), float(j));
            vec2 r = vec2(b) - f + random2(n + b);
            res = min(res, dot(r,r));
        }
    }
    return sqrt(res);
}

float sdHexagon(vec2 p, float r) {
    vec3 k = vec3(-0.866025404,0.5,0.577350269);
    p = abs(p);
    p -= 2.0*min(dot(k.xy,p),0.0)*k.xy;
    p -= vec2(clamp(p.x, -k.z*r, k.z*r), r);
    return length(p)*sign(p.y);
}

vec3 palette(float t){
    vec3 a = vec3(0.5, 0.5, 0.5);
    vec3 b = vec3(0.5, 0.5, 0.5);
    vec3 c = vec3(1.0, 1.0, 1.0);
    vec3 d = vec3(0.263, 0.416, 0.557);
    return a + b * cos(6.28318 * (c * t + d));
}

// ---------------- РЕЖИМЫ 0-9 (КЛАССИКА) ----------------
vec3 modeVoid(vec2 uv){
    vec2 uv0 = uv; vec3 finalColor = vec3(0.0);
    for(float i = 0.0; i < 4.0; i++){
        uv = fract(uv * 1.5) - 0.5;
        float d = length(uv) * exp(-length(uv0));
        vec3 col = palette(length(uv0) + i*.4 + uTime*.4);
        d = sin(d*8. + uTime)/8.; d = abs(d); d = pow(0.01/d, 1.2);
        finalColor += col * d;
    }
    return finalColor;
}

vec3 modeNebula(vec2 uv){
    vec2 p = uv * 3.0;
    vec2 q = vec2(fbm(p + uTime*0.1), fbm(p + vec2(1.0)));
    vec2 r = vec2(fbm(p + q + uTime*0.2), fbm(p + q - uTime*0.15));
    float n = fbm(p + r*2.0);
    vec3 col = mix(vec3(0.1, 0.0, 0.3), vec3(0.0, 0.6, 0.8), q.x);
    col = mix(col, vec3(0.9, 0.1, 0.6), r.y);
    return col * pow(n, 1.5) * 2.5;
}

vec3 modeTunnel(vec2 uv){
    float r = length(uv); float a = atan(uv.y, uv.x);
    vec2 tuv = vec2(0.5 / r + uTime, a / PI);
    float n = fbm(tuv * 4.0);
    vec3 col = palette(tuv.x * 0.5 + n);
    float rings = pow(sin(tuv.x * 20.0 + uTime*5.0) * 0.5 + 0.5, 3.0);
    return col * (rings + n) * r;
}

vec3 modeLiquid(vec2 uv){
    vec2 p = uv * 3.0;
    for(int i = 1; i < 6; i++){
        vec2 newp = p;
        newp.x += 0.6 / float(i) * sin(float(i) * p.y + uTime * 0.3);
        newp.y += 0.6 / float(i) * cos(float(i) * p.x + uTime * 0.3);
        p = newp;
    }
    return palette(p.x * 0.1 + p.y * 0.1 - uTime * 0.2);
}

vec3 modeGrid(vec2 uv){
    float y = abs(uv.y) + 0.02;
    vec2 gw = vec2(uv.x / y, 1.0 / y - uTime * 2.0);
    vec2 grid = fract(gw * 2.0) - 0.5;
    float lines = smoothstep(0.4, 0.45, abs(grid.x)) + smoothstep(0.4, 0.45, abs(grid.y));
    vec3 col = palette(length(uv) - uTime * 0.5) * lines * y * 1.5;
    return mix(vec3(0.05, 0.0, 0.1), col, smoothstep(0.0, 0.3, y));
}

vec3 modeFire(vec2 uv){
    vec2 p = uv * vec2(2.0, 1.0) + vec2(0.0, 0.5);
    float n = fbm(vec2(p.x * 3.0, p.y * 4.0 - uTime * 3.0));
    float shape = max(0.0, 1.0 - length(uv * vec2(1.5, 2.0) + vec2(0.0, 0.3)));
    float flame = smoothstep(0.1, 0.8, n * shape * 2.0);
    return mix(vec3(1.0, 0.1, 0.0), vec3(1.0, 0.9, 0.1), flame) * flame * 2.0;
}

vec3 modeBlackhole(vec2 uv){
    float r = length(uv); float a = atan(uv.y, uv.x);
    float whirl = fbm(vec2(r * 15.0 - uTime * 2.0, a * 3.0 + uTime * 4.0));
    float disk = smoothstep(0.2, 0.3, r) - smoothstep(0.4, 0.8, r);
    vec3 col = palette(r * 2.0 - uTime) * disk * whirl * 2.0;
    col += vec3(1.0, 0.6, 0.2) * (0.015 / abs(r - 0.2)) * smoothstep(0.15, 0.22, r);
    return col;
}

vec3 modeLaser(vec2 uv){
    vec3 col = vec3(0.0);
    for(float i = 0.0; i < 4.0; i++){
        vec2 q = uv * rot(uTime * 0.5 + i * 1.57);
        float line = 0.01 / abs(q.y + sin(q.x * 5.0 + uTime * 3.0) * 0.1);
        col += palette(i * 0.3 + uTime * 0.2) * line;
    }
    return col;
}

vec3 modeRainbow(vec2 uv){
    float d = length(uv);
    float a = atan(uv.y, uv.x) + sin(d * 8.0 - uTime * 3.0) * 0.5;
    vec3 col = 0.5 + 0.5 * cos(PI * 2.0 * (a / (PI * 2.0) + vec3(0.0, 0.33, 0.67) + uTime * 0.1));
    return col * (sin(d * 30.0 - uTime * 6.0) * 0.5 + 0.5) * smoothstep(1.5, 0.0, d);
}

vec3 modeSwarm(vec2 uv){
    float n = fbm(uv * 6.0 + fbm(uv * 6.0 + uTime * 0.2) * 2.0);
    vec3 col = palette(n * 2.0 + uTime) * pow(sin(n * 35.0) * 0.5 + 0.5, 12.0) * 3.0;
    return col + 0.03 / max(0.01, abs(sin(n * 10.0)));
}

// ---------------- НОВЫЕ РЕЖИМЫ 10-29 ----------------

// 10: CYBER - Неоновые круги данных
vec3 modeCyber(vec2 uv) {
    vec2 p = uv * 2.0; float r = length(p); float a = atan(p.y, p.x);
    float ring = step(0.8, sin(r*30.0 - uTime*5.0));
    float arc = step(0.5, sin(a*10.0 + uTime*3.0));
    float data = fbm(vec2(a*5.0, r*10.0 - uTime*4.0));
    vec3 col = mix(vec3(0.0, 1.0, 0.8), vec3(1.0, 0.0, 0.5), data);
    float glow = 0.02 / abs(sin(r*10.0 - uTime*2.0) + 0.1);
    return col * (ring * arc + glow) * exp(-r);
}

// 11: PLASMA - Электрические дуги
vec3 modePlasma(vec2 uv) {
    vec2 p = uv * 4.0; float v = 0.0;
    for(float i=1.0; i<4.0; i++) {
        p *= rot(uTime*0.2);
        v += sin(p.x*i + uTime) + cos(p.y*i - uTime*0.5);
    }
    return palette(v*0.1 + uTime) * (0.05 / abs(v));
}

// 12: GALAXY - Спиральная галактика
vec3 modeGalaxy(vec2 uv) {
    float r = length(uv); float a = atan(uv.y, uv.x) - r * 5.0 + uTime;
    vec2 q = vec2(cos(a), sin(a)) * r;
    float n = fbm(q * 10.0); float arms = abs(sin(a * 3.0));
    return vec3(0.2, 0.5, 1.0) * n / (arms * r * 5.0 + 0.1) * exp(-r*2.0);
}

// 13: FRACTAL - Множество Жюлиа (Julia Set)
vec3 modeFractal(vec2 uv) {
    vec2 z = uv * 2.5; vec2 c = vec2(cos(uTime*0.5), sin(uTime*0.3)) * 0.8;
    float i = 0.0;
    for(; i < 30.0; i++) {
        z = vec2(z.x*z.x - z.y*z.y, 2.0*z.x*z.y) + c;
        if(dot(z,z) > 4.0) break;
    }
    return palette(i*0.05 + uTime*0.1) * (i/30.0);
}

// 14: CRYSTAL - Граненый Вороной
vec3 modeCrystal(vec2 uv) {
    float v = voronoi(uv * 4.0 + vec2(uTime*0.2));
    vec3 col = palette(v * 2.0 + uTime*0.5);
    float edge = smoothstep(0.8, 1.0, v);
    return col * (1.0 + edge*2.0) * exp(-length(uv)*1.5);
}

// 15: CELLS - Микроскопическая органика
vec3 modeCells(vec2 uv) {
    vec2 p = uv * 5.0; float v = voronoi(p + fbm(p + uTime*0.5));
    vec3 col = mix(vec3(0.9, 0.1, 0.3), vec3(0.2, 0.0, 0.4), smoothstep(0.0, 0.8, v));
    return col + vec3(1.0, 0.4, 0.4) * (0.02 / abs(v - 0.2)) * exp(-length(uv)*2.0);
}

// 16: KALEIDO - Быстрый калейдоскоп
vec3 modeKaleido(vec2 uv) {
    vec2 p = uv;
    for(int i=0; i<5; i++) {
        p = abs(p) - 0.5; p *= rot(uTime*0.2 + float(i)*0.5); p *= 1.2;
    }
    return palette(length(p) - uTime) * exp(-length(uv)*2.0) / (length(p)+0.1);
}

// 17: HYPERSPACE - Гиперпрыжок / Звезды
vec3 modeHyperspace(vec2 uv) {
    float r = length(uv); float a = atan(uv.y, uv.x);
    vec2 tu = vec2(0.2/r + uTime*2.0, a/PI);
    vec2 f = fract(tu * 15.0) - 0.5;
    float n = random2(floor(tu * 15.0)).x;
    float star = smoothstep(0.8, 1.0, n) * (0.05 / length(f));
    vec3 col = palette(r*5.0 - uTime) * star * r * 5.0;
    col += vec3(0.2, 0.5, 1.0) * fbm(tu * vec2(2.0, 20.0)) * r * 1.5;
    return col;
}

// 18: MAGNETIC - Магнитные полюса / Аврора
vec3 modeMagnetic(vec2 uv) {
    float d1 = length(uv - vec2(-0.5, 0.0)); float d2 = length(uv - vec2(0.5, 0.0));
    float lines = abs(sin((d1 - d2 + uTime*0.5) * 20.0));
    vec3 col = mix(vec3(1.0, 0.0, 0.5), vec3(0.0, 0.5, 1.0), smoothstep(-0.5, 0.5, uv.x));
    return col * 0.05 / (lines + 0.01) * exp(-length(uv)*1.5);
}

// 19: QUANTUM - Квантовая интерференция
vec3 modeQuantum(vec2 uv) {
    vec2 p = uv * 15.0;
    float d1 = length(p - vec2(sin(uTime), cos(uTime))*4.0);
    float d2 = length(p - vec2(cos(uTime*1.3), sin(uTime*1.1))*4.0);
    float wave = sin(d1)*sin(d2);
    return palette(wave + uTime) * (0.02 / abs(wave)) * exp(-length(uv)*2.0);
}

// 20: LAVA - Лава-лампа (Metaballs)
vec3 modeLava(vec2 uv) {
    vec2 p = uv * 2.0; float d = 0.0;
    d += 1.0 / length(p - vec2(sin(uTime), cos(uTime*0.8)));
    d += 1.0 / length(p - vec2(cos(uTime*1.2), sin(uTime*0.5)));
    d += 1.0 / length(p - vec2(sin(uTime*0.7), cos(uTime*1.3)));
    float fill = smoothstep(3.2, 5.0, d);
    float edge = smoothstep(3.0, 3.2, d) - smoothstep(3.2, 3.4, d);
    return mix(vec3(1.0, 0.2, 0.0), vec3(1.0, 0.8, 0.0), fill) * (fill + edge*2.0);
}

// 21: NEON - Ретровейв гексагоны
vec3 modeNeon(vec2 uv) {
    vec2 p1 = uv * rot(uTime*0.5); float g1 = 0.02 / abs(sdHexagon(p1, 0.4));
    vec2 p2 = uv * rot(-uTime*0.3); float g2 = 0.02 / abs(sdHexagon(p2, 0.6));
    vec3 col = vec3(1.0, 0.0, 0.8)*g1 + vec3(0.0, 1.0, 0.8)*g2;
    vec2 grid = fract(uv * 10.0) - 0.5;
    col += vec3(0.2, 0.0, 0.4) * (smoothstep(0.45, 0.5, abs(grid.x)) + smoothstep(0.45, 0.5, abs(grid.y))) * exp(-length(uv)*2.0);
    return col;
}

// 22: ABYSS - Глубоководное свечение
vec3 modeAbyss(vec2 uv) {
    vec2 p = uv * vec2(4.0, 2.0); p.y += uTime;
    float n = fbm(p + fbm(p - uTime*0.4));
    float wave = sin(p.x*3.0 + n*8.0);
    vec3 col = mix(vec3(0.0, 0.2, 0.8), vec3(0.0, 1.0, 0.5), n);
    return col * (0.03 / abs(wave)) * exp(-length(uv));
}

// 23: ECLIPSE - Солнечное затмение
vec3 modeEclipse(vec2 uv) {
    float r = length(uv); float a = atan(uv.y, uv.x);
    float corona = fbm(vec2(a*2.0, r*5.0 - uTime));
    float rays = (sin(a*10.0 + uTime*2.0) + sin(a*25.0 - uTime)) * 0.5 + 0.5;
    vec3 col = vec3(1.0, 0.8, 0.6) * corona * rays * exp(-r*2.0) / abs(r - 0.4);
    return col * smoothstep(0.38, 0.4, r); // Вырезаем луну
}

// 24: ALIEN - Биомеханическая кожа
vec3 modeAlien(vec2 uv) {
    float n = abs(sin(fbm(uv * 5.0 + fbm(uv * 5.0 + uTime*0.3))*15.0));
    vec3 col = mix(vec3(0.1, 0.5, 0.2), vec3(0.4, 1.0, 0.5), n);
    return col * (0.02 / (n + 0.01)) * exp(-length(uv)*1.5);
}

// 25: MANDALA - Духовная геометрия
vec3 modeMandala(vec2 uv) {
    vec2 p = uv; float r = length(p); float a = mod(atan(p.y, p.x), PI/3.0) - PI/6.0;
    p = vec2(cos(a), sin(a)) * r;
    for(int i=0; i<3; i++) {
        p = abs(p) - 0.2; p *= rot(uTime*0.2);
    }
    return palette(r*5.0 - uTime) * (0.01 / abs(length(p) - 0.1)) * exp(-r*2.0);
}

// 26: CIRCUIT - Трон / Плата
vec3 modeCircuit(vec2 uv) {
    vec2 p = uv * 10.0; vec2 f = fract(p) - 0.5;
    if(random2(floor(p)).x > 0.5) f.x = -f.x; 
    float d = abs(abs(f.x + f.y) - 0.5); 
    float flow = abs(sin(d*10.0 - uTime*5.0));
    return vec3(0.0, 0.8, 1.0) * (0.02 / d) * flow * exp(-length(uv)*1.5);
}

// 27: GHOST - Призрачные потоки
vec3 modeGhost(vec2 uv) {
    vec2 p = uv; p.x += sin(p.y*3.0 + uTime)*0.1;
    float n = fbm(p * 4.0 - vec2(0.0, uTime));
    vec3 col = mix(vec3(0.0, 0.8, 0.6), vec3(0.8, 0.2, 1.0), n);
    return col * (0.02 / abs(p.x + n*0.2)) * exp(-length(uv)*4.0);
}

// 28: STARS - Параллакс звезды
vec3 modeStars(vec2 uv) {
    vec3 col = vec3(0.0);
    for(float i=1.0; i<=3.0; i++) {
        vec2 p = uv * (i * 10.0) + vec2(uTime*i*0.2, 0.0);
        vec2 f = fract(p) - 0.5; float n = random2(floor(p)).x;
        if(n > 0.95) col += vec3(1.0, 0.9, 0.8) * (0.02 / length(f)) * (i/3.0) * (sin(uTime*5.0 + n*100.0)*0.5+0.5);
    }
    return col;
}

// 29: APEX - Ультимативный геометрический взрыв
vec3 modeApex(vec2 uv) {
    vec2 p = uv; float r = length(p);
    for(int i=0; i<4; i++) {
        p = abs(p) - 0.2 - sin(uTime*0.5)*0.1;
        p *= rot(uTime*0.2 + float(i));
    }
    float d = length(p);
    vec3 col = palette(d * 5.0 - uTime + r);
    return col * (0.02 / max(0.001, d)) * smoothstep(0.1, 0.15, r) * exp(-r);
}


void main(){
    vec2 uv = vUv * 2.0 - 1.0;
    uv.x *= uResolution.x / uResolution.y;

    vec2 mouse = uPointer * 2.0 - 1.0;
    mouse.x *= uResolution.x / uResolution.y;

    vec2 mp = uv - mouse;
    float md = length(mp);
    uv += mp * (0.1 / (md * md + 0.05)) * uClick;

    vec3 col = vec3(0.0);
    int m = int(mod(uMode, 30.0));

    if(m == 0) col = modeVoid(uv);
    else if(m == 1) col = modeNebula(uv);
    else if(m == 2) col = modeTunnel(uv);
    else if(m == 3) col = modeLiquid(uv);
    else if(m == 4) col = modeGrid(uv);
    else if(m == 5) col = modeFire(uv);
    else if(m == 6) col = modeBlackhole(uv);
    else if(m == 7) col = modeLaser(uv);
    else if(m == 8) col = modeRainbow(uv);
    else if(m == 9) col = modeSwarm(uv);
    else if(m == 10) col = modeCyber(uv);
    else if(m == 11) col = modePlasma(uv);
    else if(m == 12) col = modeGalaxy(uv);
    else if(m == 13) col = modeFractal(uv);
    else if(m == 14) col = modeCrystal(uv);
    else if(m == 15) col = modeCells(uv);
    else if(m == 16) col = modeKaleido(uv);
    else if(m == 17) col = modeHyperspace(uv);
    else if(m == 18) col = modeMagnetic(uv);
    else if(m == 19) col = modeQuantum(uv);
    else if(m == 20) col = modeLava(uv);
    else if(m == 21) col = modeNeon(uv);
    else if(m == 22) col = modeAbyss(uv);
    else if(m == 23) col = modeEclipse(uv);
    else if(m == 24) col = modeAlien(uv);
    else if(m == 25) col = modeMandala(uv);
    else if(m == 26) col = modeCircuit(uv);
    else if(m == 27) col = modeGhost(uv);
    else if(m == 28) col = modeStars(uv);
    else if(m == 29) col = modeApex(uv);

    // Свечение курсора
    col += palette(uTime * 0.5) * exp(-md * 4.0) * 0.3 * uClick;

    // Виньетка
    col *= smoothstep(0.0, 0.8, 1.0 - length(vUv - 0.5) * 1.3 + 0.4);

    // Кинематографичный контраст
    col = smoothstep(0.0, 1.0, col);
    col = pow(col, vec3(0.8));

    gl_FragColor = vec4(col, 1.0);
}
`;

const material = new THREE.ShaderMaterial({
    vertexShader,
    fragmentShader,
    uniforms
});

const quad = new THREE.Mesh(
    new THREE.PlaneGeometry(2,2),
    material
);

scene.add(quad);

const MODES = [
"VOID", "NEBULA", "TUNNEL", "LIQUID", "GRID", 
"FIRE", "BLACKHOLE", "LASER", "RAINBOW", "SWARM",
"CYBER", "PLASMA", "GALAXY", "FRACTAL", "CRYSTAL",
"CELLS", "KALEIDO", "HYPERSPACE", "MAGNETIC", "QUANTUM",
"LAVA", "NEON", "ABYSS", "ECLIPSE", "ALIEN",
"MANDALA", "CIRCUIT", "GHOST", "STARS", "APEX"
];

let currentMode = 0;

function updateMode(){
    document.getElementById("mode").innerText = MODES[currentMode];
    uniforms.uMode.value = currentMode;
}

document.getElementById("next").onclick=()=>{
    currentMode++;
    if(currentMode>=MODES.length){ currentMode=0; }
    updateMode();
};

document.getElementById("prev").onclick=()=>{
    currentMode--;
    if(currentMode<0){ currentMode=MODES.length-1; }
    updateMode();
};

updateMode();

addEventListener("pointermove",e=>{
    uniforms.uPointer.value.x = e.clientX / innerWidth;
    uniforms.uPointer.value.y = 1.0 - e.clientY / innerHeight;
});

addEventListener("pointerdown",()=>{ uniforms.uClick.value = 1.0; });
addEventListener("pointerup",()=>{ uniforms.uClick.value = 0.0; });

addEventListener("resize",()=>{
    renderer.setSize(innerWidth,innerHeight);
    uniforms.uResolution.value.set(innerWidth,innerHeight);
});

let last = performance.now();
let frames = 0;

function animate(t){
    requestAnimationFrame(animate);
    uniforms.uTime.value = t*0.001;
    renderer.render(scene,camera);
    frames++;

    if(t-last>1000){
        document.getElementById("fps").innerText = frames+" FPS";
        frames = 0;
        last = t;
    }
}

animate();

</script>
</body>
</html>
