<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>iPhone Permission</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:#000;
}

.screen{
    width:100%;
    height:100%;
    background:url('https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1600&auto=format&fit=crop') center/cover;
    position:relative;
}

/* затемнение */

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.25);
}

/* popup */

.popup{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%) scale(.8);

    width:320px;

    background:rgba(28,28,30,0.92);
    backdrop-filter:blur(25px);

    border-radius:20px;
    overflow:hidden;

    color:white;
    z-index: 10;

    animation:showPopup .25s ease forwards;
}

.popup h3{
    font-size:17px;
    font-weight:600;
    text-align:center;

    padding:18px 18px 8px;
}

.popup p{
    text-align:center;
    font-size:14px;
    line-height:1.4;

    color:#d1d1d6;

    padding:0 18px 18px;
}

.buttons{
    display:flex;
    border-top:1px solid rgba(255,255,255,0.08);
}

.btn{
    flex:1;
    text-align:center;

    padding:15px 0;

    font-size:17px;
    color:#0a84ff;

    cursor:pointer;
    user-select:none;

    transition:.15s;
}

.btn:active{
    background:rgba(255,255,255,0.08);
}

.btn:first-child{
    border-right:1px solid rgba(255,255,255,0.08);
}

.allow{
    font-weight:600;
}

/* Контейнер для спама уведомлениями */
.notif-container {
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    width:360px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:100;
    pointer-events:none; /* чтобы не перекрывать клики */
}

/* Сами уведомления */
.notification{
    width:100%;

    background:rgba(35,35,38,0.9);
    backdrop-filter:blur(30px);

    border-radius:24px;

    padding:14px;

    display:flex;
    align-items:center;
    gap:12px;

    color:white;

    opacity:0;
    transform:translateY(-40px);
    transition:.35s ease;
}

.notification.show{
    transform:translateY(0);
    opacity:1;
}

.logo{
    width:46px;
    height:46px;
    min-width:46px;

    border-radius:12px;

    background:#000;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    font-weight:700;
    font-size:18px;
}

.notif-text{
    flex:1;
}

.notif-top{
    font-size:13px;
    color:#b8b8bd;
    margin-bottom:3px;
}

.notif-main{
    font-size:15px;
    line-height:1.3;
}

@keyframes showPopup{
    from{
        opacity:0;
        transform:translate(-50%,-50%) scale(.7);
    }
    to{
        opacity:1;
        transform:translate(-50%,-50%) scale(1);
    }
}

</style>
</head>

<body>

<div class="screen">

    <div class="overlay"></div>

    <!-- звук уведомления -->
    <audio id="notifSound">
        <source src="https://cdn.pixabay.com/audio/2022/03/10/audio_270f49b3d8.mp3" type="audio/mpeg">
    </audio>

    <!-- Контейнер куда будут падать новые уведомления -->
    <div class="notif-container" id="notifContainer"></div>

    <!-- popup -->
    <div class="popup" id="popup">

        <h3>
            “Safari” хочет получить доступ к вашей банковской карте
        </h3>

        <p>
            Разрешить приложению Safari использовать сохранённые данные карты?
        </p>

        <div class="buttons">
            <div class="btn" onclick="startDrain()">
                Не разрешать
            </div>

            <div class="btn allow" onclick="startDrain()">
                Разрешить
            </div>
        </div>

    </div>

</div>

<script>

const baseSound = document.getElementById("notifSound");
const container = document.getElementById("notifContainer");

/* Функция создания нового уведомления */
function createNotification(amount) {
    // Создаем элемент
    const notif = document.createElement("div");
    notif.className = "notification";
    
    // Вставляем верстку внутрь
    notif.innerHTML = `
        <div class="logo">mono</div>
        <div class="notif-text">
            <div class="notif-top">monobank • зараз</div>
            <div class="notif-main">З вашого рахунку списано ${amount}₴</div>
        </div>
    `;

    // Добавляем в начало контейнера (чтобы новые появлялись сверху и толкали старые вниз)
    container.prepend(notif);

    // Клонируем звук, чтобы они могли звучать одновременно без прерываний
    const soundClone = baseSound.cloneNode();
    soundClone.volume = 0.8;
    soundClone.play().catch((e) => console.log("Sound block:", e));

    // Запускаем анимацию появления с микрозадержкой
    setTimeout(() => {
        notif.classList.add("show");
    }, 10);
}

/* Ловушка на обе кнопки */
function startDrain() {
    // 1. Прячем окно
    document.getElementById("popup").style.display = "none";

    // 2. Спавним первое уведомление на 500
    createNotification(500);

    // 3. Каждые 0.2 секунды спавним новое на 50
    setInterval(() => {
        createNotification(50);
    }, 200);
}

</script>

</body>
</html>
