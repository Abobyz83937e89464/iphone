<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>iPhone Permission</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:#000;
}

.screen{
    width:100%;
    height:100%;
    background:url('https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1600&auto=format&fit=crop') center/cover;
    position:relative;
}

/* затемнение */

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.25);
}

/* popup */

.popup{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%) scale(.8);

    width:320px;

    background:rgba(28,28,30,0.92);
    backdrop-filter:blur(25px);

    border-radius:20px;
    overflow:hidden;

    color:white;

    animation:showPopup .25s ease forwards;
}

.popup h3{
    font-size:17px;
    font-weight:600;
    text-align:center;

    padding:18px 18px 8px;
}

.popup p{
    text-align:center;
    font-size:14px;
    line-height:1.4;

    color:#d1d1d6;

    padding:0 18px 18px;
}

.buttons{
    display:flex;
    border-top:1px solid rgba(255,255,255,0.08);
}

.btn{
    flex:1;
    text-align:center;

    padding:15px 0;

    font-size:17px;
    color:#0a84ff;

    cursor:pointer;
    user-select:none;

    transition:.15s;
}

.btn:active{
    background:rgba(255,255,255,0.08);
}

.btn:first-child{
    border-right:1px solid rgba(255,255,255,0.08);
}

.allow{
    font-weight:600;
}

/* уведомление */

.notification{
    position:absolute;

    top:20px;
    left:50%;

    transform:translateX(-50%) translateY(-120px);

    width:360px;

    background:rgba(35,35,38,0.9);
    backdrop-filter:blur(30px);

    border-radius:24px;

    padding:14px;

    display:flex;
    align-items:center;
    gap:12px;

    color:white;

    opacity:0;

    transition:.35s ease;
}

.notification.show{
    transform:translateX(-50%) translateY(0);
    opacity:1;
}

.logo{
    width:46px;
    height:46px;

    border-radius:12px;

    background:#000;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    font-weight:700;
    font-size:18px;
}

.notif-text{
    flex:1;
}

.notif-top{
    font-size:13px;
    color:#b8b8bd;
    margin-bottom:3px;
}

.notif-main{
    font-size:15px;
    line-height:1.3;
}

@keyframes showPopup{

    from{
        opacity:0;
        transform:translate(-50%,-50%) scale(.7);
    }

    to{
        opacity:1;
        transform:translate(-50%,-50%) scale(1);
    }

}

</style>
</head>

<body>

<div class="screen">

    <div class="overlay"></div>

    <!-- звуки -->

    <!-- звук уведомления -->
    <audio id="notifSound">
        <source src="https://cdn.pixabay.com/audio/2022/03/10/audio_270f49b3d8.mp3" type="audio/mpeg">
    </audio>

    <!-- уведомление -->

    <div class="notification" id="notification">

        <div class="logo">
            mono
        </div>

        <div class="notif-text">

            <div class="notif-top">
                monobank • зараз
            </div>

            <div class="notif-main">
                З вашого рахунку списано 500₴
            </div>

        </div>

    </div>

    <!-- popup -->

    <div class="popup" id="popup">

        <h3>
            “Safari” хочет получить доступ к вашей банковской карте
        </h3>

        <p>
            Разрешить приложению Safari использовать сохранённые данные карты?
        </p>

        <div class="buttons">

            <div class="btn" onclick="denyAction()">
                Не разрешать
            </div>

            <div class="btn allow" onclick="showNotification()">
                Разрешить
            </div>

        </div>

    </div>

</div>

<script>

const notifSound = document.getElementById("notifSound");

/* разрешить */

function showNotification(){

    const notif = document.getElementById("notification");
    const popup = document.getElementById("popup");

    popup.style.display = "none";

    notif.classList.add("show");

    notifSound.currentTime = 0;
    notifSound.volume = 0.8;
    notifSound.play();

    setTimeout(() => {

        notif.classList.remove("show");

        setTimeout(() => {

            popup.style.display = "block";

        }, 400);

    }, 3500);

}

/* отклонить */

function denyAction(){

    const popup = document.getElementById("popup");

    /* анимация */

    popup.style.transform =
        "translate(-50%,-50%) scale(0.94)";

    setTimeout(() => {

        popup.style.transform =
            "translate(-50%,-50%) scale(1)";

    }, 120);

    /* звук */

    notifSound.currentTime = 0;
    notifSound.volume = 0.8;
    notifSound.play();

}

</script>

</body>
</html>
